<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Across Clear Rates</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101417;
      --panel: #171d21;
      --panel-2: #20282d;
      --line: #314047;
      --text: #f4f7f8;
      --muted: #9fb0b7;
      --teal: #64d2c8;
      --gold: #e9bc62;
      --rose: #f28f88;
      --green: #8bd17c;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(135deg, rgba(100, 210, 200, 0.13), transparent 32rem),
        linear-gradient(215deg, rgba(233, 188, 98, 0.10), transparent 34rem),
        var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    button,
    input,
    select {
      font: inherit;
    }

    .shell {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 40px;
    }

    header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 20px;
      padding: 18px 0 22px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.10);
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 4.2rem);
      line-height: 0.95;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 1rem;
    }

    .status {
      min-width: 220px;
      color: var(--muted);
      text-align: right;
      font-size: 0.9rem;
    }

    .setup {
      margin: 24px 0;
      padding: 18px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .setup.hidden {
      display: none;
    }

    .setup h2 {
      margin: 0 0 8px;
      font-size: 1.1rem;
    }

    .setup p {
      margin: 0 0 14px;
      color: var(--muted);
    }

    .setup-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
    }

    input {
      width: 100%;
      min-width: 0;
      color: var(--text);
      background: #0d1113;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 11px 12px;
    }

    button {
      border: 0;
      border-radius: 6px;
      padding: 11px 14px;
      color: #0c1314;
      background: var(--teal);
      cursor: pointer;
      font-weight: 700;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 14px;
      margin: 12px 0 28px;
    }

    .fight-section {
      margin-top: 28px;
    }

    .fight-section h2 {
      margin: 0;
      font-size: 1.25rem;
    }

    .section-rule {
      height: 1px;
      margin-top: 10px;
      background: rgba(255, 255, 255, 0.10);
    }

    .fight-card {
      position: relative;
      overflow: hidden;
      min-height: 142px;
      background-image:
        linear-gradient(180deg, rgba(6, 10, 12, 0.24), rgba(6, 10, 12, 0.82)),
        var(--boss-image, linear-gradient(180deg, var(--panel-2), var(--panel)));
      background-position: center;
      background-size: cover;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      box-shadow: var(--shadow);
    }

    .fight-card::after {
      position: absolute;
      inset: 0;
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: inherit;
      content: "";
      pointer-events: none;
    }

    .fight-card h3 {
      position: relative;
      z-index: 1;
      margin: 0;
      font-size: 1.15rem;
      text-shadow: 0 2px 14px rgba(0, 0, 0, 0.72);
    }

    .rate {
      position: relative;
      z-index: 1;
      margin-top: 14px;
      font-size: 2.5rem;
      line-height: 1;
      font-weight: 800;
      text-shadow: 0 2px 16px rgba(0, 0, 0, 0.74);
    }

    .count {
      position: relative;
      z-index: 1;
      color: rgba(255, 255, 255, 0.82);
      margin-top: 8px;
      font-size: 1rem;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.68);
    }

    .empty,
    .error {
      padding: 18px;
      color: var(--muted);
    }

    .error {
      color: var(--rose);
    }

    @media (max-width: 800px) {
      header {
        align-items: stretch;
        flex-direction: column;
      }

      .status {
        text-align: left;
      }

      .setup-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header>
      <div>
        <h1>Across Clear Rates</h1>
        <p class="subtitle">Current FC progression pulled from the clear-rate sheet.</p>
      </div>
      <div id="status" class="status">Loading...</div>
    </header>

    <section id="setup" class="setup hidden">
      <h2>Connect the dashboard</h2>
      <p>Paste the deployed Apps Script web app URL. This stays in your browser for testing.</p>
      <div class="setup-row">
        <input id="apiInput" type="url" placeholder="https://script.google.com/macros/s/.../exec">
        <button id="saveApiButton" type="button">Connect</button>
      </div>
    </section>

    <div id="summaryGrid" aria-label="Clear rate summary"></div>
  </main>

  <script>
    const DEFAULT_API_ENDPOINT = "https://script.google.com/macros/s/AKfycbzcjC655hCb63Eb0CpUvDOpomCknfQmPLkvVS0Tebl-PLmrm_q9HEPQv6VUR4N7934u/exec";
    const API_STORAGE_KEY = "across-clear-rates-api-endpoint";
    const DASHBOARD_CACHE_KEY = "across-clear-rates-dashboard-summary";
    const THUMBNAILS = {
      M9S: "assets/thumbnails/M9S.jpg",
      M10S: "assets/thumbnails/M10S.jpg",
      M11S: "assets/thumbnails/M11S.jpg",
      M12S: "assets/thumbnails/M12S.jpg",
      FRU: "assets/thumbnails/FRU.jpg",
      UCOB: "assets/thumbnails/UCoB.jpg",
      UWU: "assets/thumbnails/UWU.jpg",
      TEA: "assets/thumbnails/TEA.jpg",
      DSR: "assets/thumbnails/DSR.jpg",
      TOP: "assets/thumbnails/TOP.jpg"
    };

    const state = {
      data: null
    };

    const $ = (selector) => document.querySelector(selector);
    const statusEl = $("#status");
    const setupEl = $("#setup");
    const apiInput = $("#apiInput");
    const saveApiButton = $("#saveApiButton");
    const summaryGrid = $("#summaryGrid");

    function getApiEndpoint() {
      const fromUrl = new URLSearchParams(window.location.search).get("api");
      if (fromUrl) {
        localStorage.setItem(API_STORAGE_KEY, fromUrl);
        return fromUrl;
      }

      const stored = localStorage.getItem(API_STORAGE_KEY);
      if (stored) return stored;
      return DEFAULT_API_ENDPOINT;
    }

    function hasApiEndpoint() {
      const endpoint = getApiEndpoint();
      return endpoint && !endpoint.includes("PASTE_APPS_SCRIPT");
    }

    function jsonp(url) {
      return new Promise((resolve, reject) => {
        const callbackName = "acrossClears_" + Date.now() + "_" + Math.random().toString(16).slice(2);
        const script = document.createElement("script");
        const separator = url.includes("?") ? "&" : "?";

        window[callbackName] = (payload) => {
          delete window[callbackName];
          script.remove();
          resolve(payload);
        };

        script.onerror = () => {
          delete window[callbackName];
          script.remove();
          reject(new Error("Could not load dashboard data."));
        };

        script.src = url + separator + "callback=" + encodeURIComponent(callbackName);
        document.body.appendChild(script);
      });
    }

    async function loadDashboard() {
      if (!hasApiEndpoint()) {
        statusEl.textContent = "Needs Apps Script URL";
        setupEl.classList.remove("hidden");
        return;
      }

      setupEl.classList.add("hidden");
      renderCachedDashboard();
      statusEl.textContent = state.data ? "Refreshing..." : "Loading...";

      try {
        const endpoint = getApiEndpoint();
        const payload = await jsonp(endpoint + "?action=summary");
        if (!payload.ok) throw new Error(payload.error || "Dashboard API failed.");
        state.data = payload;
        localStorage.setItem(DASHBOARD_CACHE_KEY, JSON.stringify(payload));
        renderSummary();
        statusEl.textContent = "Updated " + payload.generatedAt;
      } catch (error) {
        statusEl.textContent = "Load failed";
        if (!state.data) {
          summaryGrid.innerHTML = '<div class="fight-card error">' + escapeHtml(error.message) + "</div>";
        }
      }
    }

    function renderCachedDashboard() {
      if (state.data) return;

      try {
        const cached = JSON.parse(localStorage.getItem(DASHBOARD_CACHE_KEY) || "null");
        if (!cached || !cached.summary) return;
        state.data = cached;
        renderSummary();
        statusEl.textContent = "Cached " + cached.generatedAt;
      } catch (error) {
        localStorage.removeItem(DASHBOARD_CACHE_KEY);
      }
    }

    function renderSummary() {
      const groups = [
        { label: "Savage", rows: state.data.summary.filter((row) => /^M\d+S$/.test(String(row.encounter))) },
        { label: "Current Ultimate", rows: state.data.summary.filter((row) => row.encounter === "FRU") },
        { label: "Past Ultimates", rows: state.data.summary.filter((row) => ["UCOB", "UWU", "TEA", "DSR", "TOP"].includes(row.encounter)) }
      ];

      summaryGrid.innerHTML = groups.map((group) => `
        <section class="fight-section">
          <h2>${escapeHtml(group.label)}</h2>
          <div class="section-rule"></div>
          <div class="grid">
            ${group.rows.map(renderFightCard).join("")}
          </div>
        </section>
      `).join("");
    }

    function renderFightCard(row) {
        const clears = Number(row.clears || 0);
        const rosterSize = Number(row.rosterSize || 0);
        const thumbnail = thumbnailUrl(row.encounter);
        return `
          <article class="fight-card" style="--boss-image: url('${escapeHtml(thumbnail)}')">
            <h3>${escapeHtml(row.encounter)}</h3>
            <div class="rate">${formatWholePercent(clears, rosterSize)}</div>
            <div class="count">${clears} / ${rosterSize}</div>
          </article>
        `;
    }

    function formatWholePercent(clears, rosterSize) {
      if (!rosterSize) return "0%";
      return Math.round(clears / rosterSize * 100) + "%";
    }

    function thumbnailUrl(encounter) {
      return THUMBNAILS[String(encounter || "").toUpperCase()] || "";
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    saveApiButton.addEventListener("click", () => {
      const value = apiInput.value.trim();
      if (!value) return;
      localStorage.setItem(API_STORAGE_KEY, value);
      loadDashboard();
    });

    apiInput.value = hasApiEndpoint() ? getApiEndpoint() : "";
    loadDashboard();
  </script>
</body>
</html>
