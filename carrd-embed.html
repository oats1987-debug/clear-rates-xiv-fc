<!--
  Carrd embed for Across Clear Rates.

  Carrd steps:
  1. Add an Embed element.
  2. Set Type to Code.
  3. Set Style to Inline.
  4. Paste this entire file into the embed code box.
-->

<style>
  #across-clear-rates-embed {
    --acr-bg: #101417;
    --acr-panel: #171d21;
    --acr-panel-2: #20282d;
    --acr-line: #314047;
    --acr-text: #f4f7f8;
    --acr-muted: #9fb0b7;
    --acr-rose: #f28f88;
    --acr-shadow: 0 24px 70px rgba(0, 0, 0, 0.28);

    box-sizing: border-box;
    width: 100%;
    margin: 0 auto;
    padding: 28px 16px 40px;
    color: var(--acr-text);
    background:
      linear-gradient(135deg, rgba(100, 210, 200, 0.13), transparent 32rem),
      linear-gradient(215deg, rgba(233, 188, 98, 0.10), transparent 34rem),
      var(--acr-bg);
    border-radius: 8px;
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    letter-spacing: 0;
  }

  #across-clear-rates-embed *,
  #across-clear-rates-embed *::before,
  #across-clear-rates-embed *::after {
    box-sizing: border-box;
  }

  #across-clear-rates-embed .acr-shell {
    width: min(1180px, 100%);
    margin: 0 auto;
  }

  #across-clear-rates-embed .acr-header {
    display: flex;
    align-items: end;
    justify-content: space-between;
    gap: 20px;
    padding: 18px 0 22px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.10);
  }

  #across-clear-rates-embed .acr-title {
    margin: 0;
    color: var(--acr-text);
    font-size: clamp(2rem, 5vw, 4.2rem);
    line-height: 0.95;
    letter-spacing: 0;
  }

  #across-clear-rates-embed .acr-subtitle {
    margin: 10px 0 0;
    color: var(--acr-muted);
    font-size: 1rem;
    line-height: 1.4;
  }

  #across-clear-rates-embed .acr-status {
    min-width: 220px;
    color: var(--acr-muted);
    text-align: right;
    font-size: 0.9rem;
    line-height: 1.4;
  }

  #across-clear-rates-embed .acr-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
    gap: 14px;
    margin: 12px 0 28px;
  }

  #across-clear-rates-embed .acr-grid.acr-single-tile {
    grid-template-columns: minmax(190px, 360px);
  }

  #across-clear-rates-embed .acr-section {
    margin-top: 28px;
  }

  #across-clear-rates-embed .acr-section-title {
    margin: 0;
    color: var(--acr-text);
    font-size: 1.25rem;
    line-height: 1.2;
    letter-spacing: 0;
  }

  #across-clear-rates-embed .acr-section-rule {
    height: 1px;
    margin-top: 10px;
    background: rgba(255, 255, 255, 0.10);
  }

  #across-clear-rates-embed .acr-card {
    position: relative;
    overflow: hidden;
    min-height: 142px;
    padding: 18px;
    color: var(--acr-text);
    background-image:
      linear-gradient(180deg, rgba(6, 10, 12, 0.24), rgba(6, 10, 12, 0.82)),
      var(--boss-image, linear-gradient(180deg, var(--acr-panel-2), var(--acr-panel)));
    background-position: center;
    background-size: cover;
    border: 1px solid var(--acr-line);
    border-radius: 8px;
    box-shadow: var(--acr-shadow);
  }

  #across-clear-rates-embed .acr-card::after {
    position: absolute;
    inset: 0;
    border: 1px solid rgba(255, 255, 255, 0.13);
    border-radius: inherit;
    content: "";
    pointer-events: none;
  }

  #across-clear-rates-embed .acr-card-title {
    position: relative;
    z-index: 1;
    margin: 0;
    color: var(--acr-text);
    font-size: 1.15rem;
    line-height: 1.2;
    letter-spacing: 0;
    text-shadow: 0 2px 14px rgba(0, 0, 0, 0.72);
  }

  #across-clear-rates-embed .acr-rate {
    position: relative;
    z-index: 1;
    margin-top: 14px;
    color: var(--acr-text);
    font-size: 2.5rem;
    line-height: 1;
    font-weight: 800;
    text-shadow: 0 2px 16px rgba(0, 0, 0, 0.74);
  }

  #across-clear-rates-embed .acr-count {
    position: relative;
    z-index: 1;
    margin-top: 8px;
    color: rgba(255, 255, 255, 0.82);
    font-size: 1rem;
    line-height: 1.3;
    text-shadow: 0 2px 12px rgba(0, 0, 0, 0.68);
  }

  #across-clear-rates-embed .acr-error {
    padding: 18px;
    color: var(--acr-rose);
  }

  @media (max-width: 800px) {
    #across-clear-rates-embed .acr-header {
      align-items: stretch;
      flex-direction: column;
    }

    #across-clear-rates-embed .acr-status {
      text-align: left;
    }
  }
</style>

<div id="across-clear-rates-embed">
  <main class="acr-shell">
    <header class="acr-header">
      <div>
        <h1 class="acr-title">Across Clear Rates</h1>
        <p class="acr-subtitle">Current FC progression pulled from the clear-rate sheet.</p>
      </div>
      <div id="acrStatus" class="acr-status">Loading...</div>
    </header>

    <div id="acrSummaryGrid" aria-label="Clear rate summary"></div>
  </main>
</div>

<script>
  (function() {
    const DEFAULT_API_ENDPOINT = "https://script.google.com/macros/s/AKfycbzcjC655hCb63Eb0CpUvDOpomCknfQmPLkvVS0Tebl-PLmrm_q9HEPQv6VUR4N7934u/exec";
    const DASHBOARD_CACHE_KEY = "across-clear-rates-carrd-summary";
    const ASSET_BASE_URL = "https://oats1987-debug.github.io/clear-rates-xiv-fc/assets/thumbnails/";
    const THUMBNAILS = {
      M9S: ASSET_BASE_URL + "M9S.jpg",
      M10S: ASSET_BASE_URL + "M10S.jpg",
      M11S: ASSET_BASE_URL + "M11S.jpg",
      M12S: ASSET_BASE_URL + "M12S.jpg",
      FRU: ASSET_BASE_URL + "FRU.jpg",
      UCOB: ASSET_BASE_URL + "UCoB.jpg",
      UWU: ASSET_BASE_URL + "UWU.jpg",
      TEA: ASSET_BASE_URL + "TEA.jpg",
      DSR: ASSET_BASE_URL + "DSR.jpg",
      TOP: ASSET_BASE_URL + "TOP.jpg"
    };

    const statusEl = document.getElementById("acrStatus");
    const summaryGrid = document.getElementById("acrSummaryGrid");
    const state = { data: null };

    function jsonp(url) {
      return new Promise((resolve, reject) => {
        const callbackName = "acrossClears_" + Date.now() + "_" + Math.random().toString(16).slice(2);
        const script = document.createElement("script");
        const separator = url.includes("?") ? "&" : "?";

        window[callbackName] = (payload) => {
          delete window[callbackName];
          script.remove();
          resolve(payload);
        };

        script.onerror = () => {
          delete window[callbackName];
          script.remove();
          reject(new Error("Could not load dashboard data."));
        };

        script.src = url + separator + "callback=" + encodeURIComponent(callbackName);
        document.body.appendChild(script);
      });
    }

    async function loadDashboard() {
      renderCachedDashboard();
      statusEl.textContent = state.data ? "Refreshing..." : "Loading...";

      try {
        const payload = await jsonp(DEFAULT_API_ENDPOINT + "?action=summary");
        if (!payload.ok) throw new Error(payload.error || "Dashboard API failed.");
        state.data = payload;
        localStorage.setItem(DASHBOARD_CACHE_KEY, JSON.stringify(payload));
        renderSummary();
        statusEl.textContent = "Updated " + payload.generatedAt;
      } catch (error) {
        statusEl.textContent = "Load failed";
        if (!state.data) {
          summaryGrid.innerHTML = '<div class="acr-card acr-error">' + escapeHtml(error.message) + "</div>";
        }
      }
    }

    function renderCachedDashboard() {
      if (state.data) return;

      try {
        const cached = JSON.parse(localStorage.getItem(DASHBOARD_CACHE_KEY) || "null");
        if (!cached || !cached.summary) return;
        state.data = cached;
        renderSummary();
        statusEl.textContent = "Cached " + cached.generatedAt;
      } catch (error) {
        localStorage.removeItem(DASHBOARD_CACHE_KEY);
      }
    }

    function renderSummary() {
      const groups = [
        { label: "Savage", rows: state.data.summary.filter((row) => /^M\d+S$/.test(String(row.encounter))) },
        { label: "Current Ultimate", layout: "acr-single-tile", rows: state.data.summary.filter((row) => row.encounter === "FRU") },
        { label: "Past Ultimates", rows: state.data.summary.filter((row) => ["UCOB", "UWU", "TEA", "DSR", "TOP"].includes(row.encounter)) }
      ];

      summaryGrid.innerHTML = groups.map((group) => `
        <section class="acr-section">
          <h2 class="acr-section-title">${escapeHtml(group.label)}</h2>
          <div class="acr-section-rule"></div>
          <div class="acr-grid ${escapeHtml(group.layout || "")}">
            ${group.rows.map(renderFightCard).join("")}
          </div>
        </section>
      `).join("");
    }

    function renderFightCard(row) {
      const clears = Number(row.clears || 0);
      const rosterSize = Number(row.rosterSize || 0);
      const thumbnail = thumbnailUrl(row.encounter);
      return `
        <article class="acr-card" style="--boss-image: url('${escapeHtml(thumbnail)}')">
          <h3 class="acr-card-title">${escapeHtml(row.encounter)}</h3>
          <div class="acr-rate">${formatWholePercent(clears, rosterSize)}</div>
          <div class="acr-count">${clears} / ${rosterSize}</div>
        </article>
      `;
    }

    function formatWholePercent(clears, rosterSize) {
      if (!rosterSize) return "0%";
      return Math.round(clears / rosterSize * 100) + "%";
    }

    function thumbnailUrl(encounter) {
      return THUMBNAILS[String(encounter || "").toUpperCase()] || "";
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    loadDashboard();
  })();
</script>
